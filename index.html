<!DOCTYPE html>
<html lang="jp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <title>Kimetsu_API</title>
  </head>
  <body>
    <div class="container vh-100 bg-light position-relative">
      <h1 class="text-center pt-5 pb-3">鬼滅の刃 キャラクター</h1>
      <!-- フォーム -->
      <form id="js-radios" class="d-flex justify-content-center">
        <!-- 全キャラクター -->
        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="category"
            value="all"
            checked
          />
          <label class="form-check-label">全キャラクター</label>
        </div>

        <!-- 鬼殺隊 -->
        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="category"
            value="kisatsutai"
          />
          <label class="form-check-label">鬼殺隊</label>
        </div>

        <!-- 柱 -->
        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="category"
            value="hashira"
          />
          <label class="form-check-label">柱</label>
        </div>

        <!-- 鬼 -->
        <div class="form-check form-check-inline">
          <input
            class="form-check-input"
            type="radio"
            name="category"
            value="oni"
          />
          <label class="form-check-label">鬼</label>
        </div>
      </form>

      <ul class="px-5">
        <!-- スピナー -->
        <div
          id="js-spinner"
          class="d-flex d-none position-absolute top-50 start-50 translate-middle"
        >
          <span class="visually-hidde text-secondary">Now Loading...</span>
          <div class="spinner-border text-info" role="status"></div>
        </div>
        <!-- キャラクター一覧 -->
        <div
          id="js-character-list"
          class="row row-cols-1 row-cols-md-3 g-4 mt-3"
        >
          <!-- <div class="col">
            <div class="card h-100 bg-dark shadow">
              <img
                src="saikorostakesenpai.jpg"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body">
                <h5 class="card-title text-center text-warning fst-italic">
                  鬼殺隊
                </h5>
                <h4 class="card-title text-center text-light fw-bold mt-3 mb-4">
                  サイコロステーキ先輩
                </h4>
              </div>
            </div>
          </div> -->
        </div>
      </ul>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
